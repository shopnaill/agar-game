# One-click deploy blueprint for Render (https://render.com).
# Point Render at this repo; it reads this file and provisions the service.
services:
  - type: web
    name: three-agar
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
    healthCheckPath: /
